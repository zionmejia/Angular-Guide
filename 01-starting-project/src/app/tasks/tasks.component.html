<app-card>
  <section id="tasks">
    <header>
      <h2> {{ name }}'s Tasks </h2>
      <menu>
        <button (click)="toggleTaskForm()">Add Task</button>
      </menu>
    </header>

    <ul>
      @for (task of selectedUserTasks; track task.id) {
        <li>
          <app-task [task]="task" />
        </li>
      }
    </ul>
    @if (showTaskForm) {
      <new-task [userId]="userId" (toggle)="toggleTaskForm()" ></new-task>
    }
  </section>
</app-card>
